        // --- 2. GAME STATE & LOGIC ---
        let unplayedQuestions = [];
        let currentQuestion = null;

        let correctCount = 0;
        let missedCount = 0;

        let timerInterval = null;
        let timeRemaining = 0;
        let isGameActive = false;

        // Populate Cheat Sheet on load
        function initCheatSheet() {
            const list = document.getElementById('cheat-sheet-list');
            Object.values(patternsMap).forEach(patternName => {
                const li = document.createElement('li');
                li.className = "py-1 border-b border-gray-800 last:border-0";
                li.innerText = patternName;
                list.appendChild(li);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Pulls a random question that hasn't been played yet
        function nextQuestion() {
            if (unplayedQuestions.length === 0) {
                // Refill and shuffle if they play through all of them
                unplayedQuestions = [...questionsData];
                shuffleArray(unplayedQuestions);
            }

            currentQuestion = unplayedQuestions.pop();

            // UI Updates
            document.getElementById('q-title').innerText = currentQuestion.title;
            document.getElementById('q-description').innerText = currentQuestion.description;

            const diffEl = document.getElementById('q-difficulty');
            diffEl.innerText = currentQuestion.difficulty;
            // Set Badge color based on difficulty
            diffEl.className = "px-3 py-1 text-xs font-bold rounded-full uppercase tracking-wider ";
            if (currentQuestion.difficulty === "Easy") diffEl.className += "bg-green-100 text-green-700";
            else if (currentQuestion.difficulty === "Medium") diffEl.className += "bg-yellow-100 text-yellow-700";
            else diffEl.className += "bg-red-100 text-red-700";

            // Reset UI States
            document.getElementById('reveal-btn').classList.remove('hidden');
            document.getElementById('reveal-section').classList.add('hidden');
            document.getElementById('reveal-section').classList.remove('flex');
        }

        // Shows the answer
        function revealAnswer() {
            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('reveal-section').classList.remove('hidden');
            document.getElementById('reveal-section').classList.add('flex');

            document.getElementById('r-pattern').innerText = patternsMap[currentQuestion.patternId];
            document.getElementById('r-clues').innerText = currentQuestion.clues;
            document.getElementById('r-link').href = currentQuestion.url;
        }

        // Records the score and moves to next
        function recordAnswer(isCorrect) {
            if (!isGameActive) return; // Prevent scoring if timer ran out

            if (isCorrect) {
                correctCount++;
                document.getElementById('score-correct').innerText = correctCount;
            } else {
                missedCount++;
                document.getElementById('score-missed').innerText = missedCount;
            }
            nextQuestion();
        }

        // --- 3. TIMER LOGIC ---
        function startTimer(minutes) {
            clearInterval(timerInterval);

            // Reset Game
            correctCount = 0;
            missedCount = 0;
            document.getElementById('score-correct').innerText = "0";
            document.getElementById('score-missed').innerText = "0";

            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('hidden');

            timeRemaining = minutes * 60;
            isGameActive = true;
            updateTimerDisplay();

            unplayedQuestions = [...questionsData];
            shuffleArray(unplayedQuestions);
            nextQuestion();

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 0) {
                    endSession();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            const display = document.getElementById('timer-display');
            display.innerText = `${m}:${s}`;

            if (timeRemaining < 60 && timeRemaining > 0) {
                display.classList.add('text-red-500');
                display.classList.remove('text-gray-400');
            } else {
                display.classList.add('text-gray-400');
                display.classList.remove('text-red-500');
            }
        }

        function endSession() {
            clearInterval(timerInterval);
            isGameActive = false;
            document.getElementById('timer-display').innerText = "00:00";

            // Hide main app, show end screen
            document.getElementById('app-container').classList.add('hidden');
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden');

            document.getElementById('final-correct').innerText = correctCount;
            document.getElementById('final-missed').innerText = missedCount;
        }

        // Initialize on load
        window.onload = () => {
            initCheatSheet();
            // Start default practice mode (no timer constraint initially, or start 5m)
            unplayedQuestions = [...questionsData];
            shuffleArray(unplayedQuestions);
            isGameActive = true; // allow scoring without timer for freeplay
            nextQuestion();
        };
